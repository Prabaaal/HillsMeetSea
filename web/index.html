<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bond - just the two of you">

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HillsMeetSea">
  <meta name="theme-color" content="#0D0021">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <title>HillsMeetSea</title>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    body {
      background-color: #0D0021;
      margin: 0;
      padding: 0;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      font-family: serif;
      color: rgba(255,255,255,0.4);
      font-size: 32px;
      letter-spacing: -1px;
    }
    #loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(181,123,255,0.3);
      border-top-color: #B57BFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <span>HillsMeetSea</span>
    <div id="loading-spinner"></div>
  </div>

  <script>
    // Register service worker for PWA + push notifications
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('flutter_service_worker.js?v=1');
    }
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>

  <script src="push_bootstrap.js" defer></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
